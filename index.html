<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Archive - 디자인 이슈 포스팅</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3HECT8TG69"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-3HECT8TG69');
  </script>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1 class="logo">Design Archive</h1>
      <div class="header-actions">
        <button id="add-post-btn" class="action-btn" aria-label="새 포스트 작성">
          <i class="fas fa-plus"></i>
        </button>
        <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="intro">
      <p class="intro-text">매일 마주하는 디자인 이슈와 영감을 아카이빙합니다.</p>
    </section>

    <div id="posts-container" class="posts-grid">
      <!-- Posts will be dynamically added here -->
    </div>
  </main>

  <!-- Add Post Modal -->
  <div id="post-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2>새로운 디자인 이슈 기록</h2>
      <form id="post-form">
        <div class="form-group">
          <label for="post-title">제목</label>
          <input type="text" id="post-title" placeholder="디자인 이슈의 핵심을 적어주세요" required>
        </div>
        <div class="form-group">
          <label for="post-content">내용</label>
          <textarea id="post-content" placeholder="이슈에 대한 상세한 내용을 작성해주세요" rows="5" required></textarea>
        </div>
        <div class="form-group">
          <label for="post-tag">태그</label>
          <input type="text" id="post-tag" placeholder="UI, UX, 트렌드 등">
        </div>
        <button type="submit" class="submit-btn">포스팅하기</button>
      </form>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
